<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>サブスク管理</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1A6B5A;
      --primary-dark: #104840;
      --primary-light: #E8F5F2;
      --accent: #2DC99E;
      --bg: #F4F6F8;
      --card: #FFFFFF;
      --text: #1E2A35;
      --text-sub: #6B7B8D;
      --border: #E4EAF0;
      --warn-bg: #FFF8E6;
      --warn-text: #9A6700;
      --danger: #E05050;
      --nav-h: 64px;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      padding-bottom: calc(var(--nav-h) + 16px);
    }

    /* ========== ヘッダー ========== */
    .header {
      background: var(--primary);
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
    }

    /* ========== レイアウト ========== */
    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 18px 16px;
    }

    .page { display: none; }
    .page.active { display: block; animation: slideUp .25s ease; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ========== ボトムナビ ========== */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      height: var(--nav-h);
      background: #fff;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      z-index: 300;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--text-sub);
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: none;
      letter-spacing: .5px;
      transition: color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn svg { width: 22px; height: 22px; fill: currentColor; transition: fill .2s; }
    .nav-btn.active { color: var(--primary); }
    .nav-btn:not(.active):active { color: var(--text); }

    /* ========== カード ========== */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-sub);
      letter-spacing: .5px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    /* ========== サマリーグリッド ========== */
    .summary-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .summary-tile {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: transform .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .summary-tile:active { transform: scale(.97); }
    .summary-tile .label {
      font-size: 11px;
      color: var(--text-sub);
      font-weight: 500;
      margin-bottom: 8px;
    }
    .summary-tile .amount {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
    }
    .summary-tile .amount sup { font-size: 13px; margin-right: 2px; }

    /* ========== インサイトバー ========== */
    .insight-bar {
      display: none;
      background: linear-gradient(135deg, var(--primary) 0%, #1e9470 100%);
      color: #fff;
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .insight-bar b { font-weight: 700; }

    /* ========== アラート ========== */
    .alert-box {
      background: var(--warn-bg);
      border-left: 3px solid #F5A623;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--warn-text);
      margin-bottom: 10px;
      position: relative;
      padding-right: 32px;
    }
    .alert-box .x {
      position: absolute;
      top: 10px; right: 10px;
      background: none;
      border: none;
      font-size: 14px;
      color: var(--warn-text);
      cursor: pointer;
      line-height: 1;
    }

    /* ========== チャート ========== */
    .chart-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .chart-head .ttl { font-size: 13px; font-weight: 700; color: var(--text); }
    .period-toggle {
      display: flex;
      background: var(--bg);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .period-btn {
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 700;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-sub);
      transition: all .2s;
    }
    .period-btn.active {
      background: var(--primary);
      color: #fff;
      border-radius: 6px;
    }
    .chart-wrap { position: relative; height: 200px; }
    .chart-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-sub);
      margin-top: 8px;
    }

    /* ========== トグル ========== */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 12px;
      color: var(--text-sub);
      font-weight: 500;
    }
    .sw { position: relative; width: 40px; height: 22px; }
    .sw input { opacity: 0; width: 0; height: 0; }
    .sw-track {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      cursor: pointer;
      transition: background .25s;
    }
    .sw-track::before {
      content: '';
      position: absolute;
      left: 3px; top: 3px;
      width: 16px; height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform .25s;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .sw input:checked + .sw-track { background: var(--primary); }
    .sw input:checked + .sw-track::before { transform: translateX(18px); }

    /* ========== 明細リスト ========== */
    .list-ctrl {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .list-ctrl select {
      flex: 1;
      padding: 9px 10px;
      font-size: 12px;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: var(--text);
      -webkit-appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%236B7B8D"><path d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 8px center;
      padding-right: 26px;
    }
    .list-ctrl select:focus { outline: none; border-color: var(--primary); }

    .sub-card {
      background: var(--card);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .sub-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .sub-name { font-size: 15px; font-weight: 700; line-height: 1.3; }
    .sub-price { font-size: 15px; font-weight: 700; white-space: nowrap; margin-left: 8px; }
    .sub-price .unit { font-size: 11px; font-weight: 400; color: var(--text-sub); }
    .sub-mid { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 5px;
      color: #fff;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .sub-bot {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .sub-meta { font-size: 11px; color: var(--text-sub); }
    .sub-memo {
      font-size: 11px; color: #888;
      background: #f5f5f5;
      padding: 3px 7px;
      border-radius: 4px;
      margin-top: 3px;
      display: inline-block;
    }
    .action-row { display: flex; gap: 6px; }
    .btn-edit {
      padding: 5px 12px;
      font-size: 12px; font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--primary);
      background: #fff;
      color: var(--primary);
      font-family: inherit;
    }
    .btn-del {
      padding: 5px 12px;
      font-size: 12px; font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--danger);
      background: #fff;
      color: var(--danger);
      font-family: inherit;
    }
    .empty { text-align: center; padding: 40px 16px; color: var(--text-sub); font-size: 13px; line-height: 2; }

    /* ========== 追加フォーム ========== */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-sub);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .cat-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 10px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      white-space: nowrap;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-sub);
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .cat-tab.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
    .quick-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      font-family: inherit;
      transition: border-color .15s, background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .quick-btn:active { background: var(--primary-light); border-color: var(--primary); }
    .quick-btn .qname { font-size: 13px; font-weight: 700; color: var(--text); display: block; margin-bottom: 4px; }
    .quick-btn .qprice { font-size: 11px; color: var(--text-sub); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; }
    .form-row input, .form-row select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 9px;
      font-size: 15px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      -webkit-appearance: none;
      transition: border-color .2s;
    }
    .form-row input:focus, .form-row select:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
    }
    .form-row select {
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%236B7B8D"><path d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 10px center;
      padding-right: 30px;
    }
    .form-2col { display: grid; grid-template-columns: 3fr 2fr; gap: 10px; }

    .btn-submit {
      width: 100%;
      padding: 15px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-submit:active { opacity: .8; }
    .btn-cancel {
      width: 100%;
      padding: 14px;
      background: #fff;
      color: var(--text-sub);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 10px;
      display: none;
    }
    .onetime-note {
      font-size: 11px;
      color: var(--text-sub);
      text-align: right;
      margin-top: -10px;
      margin-bottom: 12px;
      display: none;
    }
    .list-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .list-head .ttl { font-size: 15px; font-weight: 700; }
    .list-head .cnt { font-size: 12px; color: var(--text-sub); }
  </style>
</head>
<body>

<div class="header"><h1>サブスク管理</h1></div>

<div class="wrap">

  <!-- ① ダッシュボード -->
  <div id="pg-dashboard" class="page active">

    <div class="toggle-row">
      <span>買い切りを含める</span>
      <label class="sw">
        <input type="checkbox" id="sw-onetime" onchange="toggleOnetime()">
        <span class="sw-track"></span>
      </label>
    </div>

    <div id="onetime-note" class="onetime-note">※買い切りは「年間合計」にのみ加算されます</div>

    <div id="alerts"></div>
    <div id="insight-bar" class="insight-bar"></div>

    <div class="summary-row">
      <div class="summary-tile" onclick="goto('list')">
        <div class="label">月間の支払い合計</div>
        <div class="amount" id="ttl-month"><sup>¥</sup>0</div>
      </div>
      <div class="summary-tile" onclick="goto('list')">
        <div class="label">年間の支払い合計</div>
        <div class="amount" id="ttl-year"><sup>¥</sup>0</div>
      </div>
    </div>

    <div class="card">
      <div class="chart-head">
        <span class="ttl">カテゴリ別支出</span>
        <div class="period-toggle">
          <button id="pbtn-month" class="period-btn active" onclick="setPeriod('month')">月額</button>
          <button id="pbtn-year" class="period-btn" onclick="setPeriod('year')">年額</button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
      <div class="chart-hint">💡 カテゴリをタップすると明細が絞り込めます</div>
    </div>
  </div>

  <!-- ② 明細・管理 -->
  <div id="pg-list" class="page">
    <div class="list-head">
      <span class="ttl">明細一覧</span>
      <span class="cnt" id="list-cnt"></span>
    </div>
    <div class="list-ctrl">
      <select id="fl-cat" onchange="renderList()">
        <option value="all">すべてのカテゴリ</option>
        <option value="動画・配信">動画・配信</option>
        <option value="音楽">音楽</option>
        <option value="電子書籍・雑誌">電子書籍・雑誌</option>
        <option value="仕事・ツール">仕事・ツール</option>
        <option value="ゲーム">ゲーム</option>
        <option value="その他">その他</option>
      </select>
      <select id="fl-sort" onchange="renderList()">
        <option value="price-desc">金額が高い順</option>
        <option value="date-asc">更新日が近い順</option>
        <option value="newest">登録が新しい順</option>
      </select>
    </div>
    <div id="sub-list"></div>
  </div>

  <!-- ③ 追加・編集 -->
  <div id="pg-add" class="page">
    <div class="card" id="quick-section">
      <div class="section-label">定番から選ぶ</div>
      <div class="cat-tabs" id="q-tabs"></div>
      <div class="quick-grid" id="q-items"></div>
    </div>

    <div class="card">
      <div class="section-label" id="form-lbl">手動で入力</div>
      <form id="add-form" autocomplete="off">
        <div class="form-row">
          <label>サービス名</label>
          <input type="text" id="f-name" required placeholder="例：独自サービス">
        </div>
        <div class="form-row">
          <label>カテゴリ</label>
          <select id="f-cat" onchange="toggleCustomCat()">
            <option value="動画・配信">動画・配信</option>
            <option value="音楽">音楽</option>
            <option value="電子書籍・雑誌">電子書籍・雑誌</option>
            <option value="仕事・ツール">仕事・ツール</option>
            <option value="ゲーム">ゲーム</option>
            <option value="その他">その他（自由入力）</option>
          </select>
          <input type="text" id="f-cat-custom" placeholder="カテゴリ名を入力" style="display:none;margin-top:8px;">
        </div>
        <div class="form-2col">
          <div class="form-row">
            <label>料金（円）</label>
            <input type="number" id="f-price" required min="0" placeholder="0">
          </div>
          <div class="form-row">
            <label>支払頻度</label>
            <select id="f-freq">
              <option value="月額">月額</option>
              <option value="年額">年額</option>
              <option value="単発（買い切り）">単発</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label>次回更新日（買い切りは購入日）</label>
          <input type="date" id="f-date" required>
        </div>
        <div class="form-row">
          <label>メモ <span style="font-weight:400;font-size:11px;color:#999;">任意</span></label>
          <input type="text" id="f-memo" placeholder="例：解約検討中">
        </div>
        <button type="submit" id="btn-submit" class="btn-submit">登録する</button>
        <button type="button" id="btn-cancel" class="btn-cancel" onclick="cancelEdit()">編集をキャンセル</button>
      </form>
    </div>
  </div>

</div><!-- /wrap -->

<!-- ボトムナビ -->
<nav class="bottom-nav">
  <button class="nav-btn" id="nav-add" onclick="goto('add')">
    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    追加
  </button>
  <button class="nav-btn active" id="nav-dashboard" onclick="goto('dashboard')">
    <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
    ホーム
  </button>
  <button class="nav-btn" id="nav-list" onclick="goto('list')">
    <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
    明細
  </button>
</nav>

<script>
/* ============================================================
   データ・定数
============================================================ */
let subs = JSON.parse(localStorage.getItem('subsData')) || [];
subs.forEach(s => { if(s.freq==='単発') s.freq='単発（買い切り）'; });

let myChart = null;
let chartPeriod = 'month';
let editId = null;
let inclOnetime = JSON.parse(localStorage.getItem('inclOnetime')) || false;
const MAX = 200;

const catMap = {
  "動画・配信":    { color:"#1A6B5A", icon:"🎬" },

  "その他":        { color:"#7C8DA0", icon:"✨" }
};

// 定番マスタデータ（拡充版）
const qData = {

    { name:"Hulu",             price:1026, freq:"月額" },
    { name:"Disney+",          price:990,  freq:"月額" },
    { name:"dアニメストア",    price:440,  freq:"月額" },
    { name:"ABEMA プレミアム", price:960,  freq:"月額" },
    { name:"DMM TV",           price:550,  freq:"月額" },
    { name:"NHKオンデマンド",  price:990,  freq:"月額" }
  ],
  "音楽": [
    { name:"Spotify",          price:980,  freq:"月額" },
    { name:"Apple Music",      price:1080, freq:"月額" },
    { name:"YouTube Music",    price:980,  freq:"月額" },
    { name:"Amazon Music UL",  price:980,  freq:"月額" },
    { name:"LINE MUSIC",       price:980,  freq:"月額" },
    { name:"AWA",              price:960,  freq:"月額" },
    { name:"Audible",          price:1500, freq:"月額" }
  ],

/* ============================================================
   ナビゲーション
============================================================ */
function goto(page, filterCat = null) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('pg-' + page).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + page).classList.add('active');

  if (page === 'dashboard') {
    renderDashboard();
  } else if (page === 'list') {
    if (filterCat) {
      const sel = document.getElementById('fl-cat');
      const valid = Array.from(sel.options).some(o => o.value === filterCat);
      sel.value = valid ? filterCat : 'その他';
    }
    renderList();
  } else if (page === 'add') {
    window.scrollTo(0, 0);
  }
}

/* ============================================================
   初期化
============================================================ */
function init() {
  document.getElementById('sw-onetime').checked = inclOnetime;
  buildQuickAdd();
  renderDashboard();
}

/* ============================================================
   クイック追加
============================================================ */
function buildQuickAdd() {
  const tabs = document.getElementById('q-tabs');
  Object.keys(qData).forEach((cat, i) => {
    const t = document.createElement('button');
    t.type = 'button';
    t.className = 'cat-tab' + (i === 0 ? ' active' : '');
    t.textContent = cat;
    t.onclick = () => { document.querySelectorAll('.cat-tab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); buildQItems(cat); };
    tabs.appendChild(t);
  });
  buildQItems(Object.keys(qData)[0]);
}

function buildQItems(cat) {
  const box = document.getElementById('q-items');
  box.innerHTML = '';
  qData[cat].forEach(item => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'quick-btn';
    b.innerHTML = `<span class="qname">+ ${item.name}</span><span class="qprice">¥${item.price.toLocaleString()} / ${item.freq}</span>`;
    b.onclick = () => fillForm(item, cat);
    box.appendChild(b);
  });
}

function fillForm(item, cat) {
  cancelEdit();
  document.getElementById('f-name').value = item.name;
  document.getElementById('f-price').value = item.price;
  document.getElementById('f-freq').value = item.freq;
  document.getElementById('f-cat').value = cat;
  toggleCustomCat();
  const d = new Date(); d.setMonth(d.getMonth() + 1);
  document.getElementById('f-date').value = d.toISOString().split('T')[0];
  document.getElementById('f-name').focus();
}

function toggleCustomCat() {
  const v = document.getElementById('f-cat').value;
  const ci = document.getElementById('f-cat-custom');
  if (v === 'その他') { ci.style.display='block'; ci.setAttribute('required',''); }
  else { ci.style.display='none'; ci.removeAttribute('required'); }
}

/* ============================================================
   フォーム送信
============================================================ */
document.getElementById('add-form').addEventListener('submit', function(e) {
  e.preventDefault();
  if (!editId && subs.length >= MAX) { alert(`上限（${MAX}件）に達しています。`); return; }

  const nm = document.getElementById('f-name').value.trim();
  let cat = document.getElementById('f-cat').value;
  if (cat === 'その他') {
    const cv = document.getElementById('f-cat-custom').value.trim();
    if (cv) cat = cv;
  }

  if (!editId && subs.some(s => s.name.toLowerCase() === nm.toLowerCase())) {
    if (!confirm(`「${nm}」は登録済みですが追加しますか？`)) return;
  }

  const data = {
    id:    editId || Date.now(),
    name:  nm,
    cat:   cat,
    price: parseInt(document.getElementById('f-price').value),
    freq:  document.getElementById('f-freq').value,
    date:  document.getElementById('f-date').value,
    memo:  document.getElementById('f-memo').value.trim()
  };

  if (editId) {
    const idx = subs.findIndex(s => s.id === editId);
    if (idx !== -1) subs[idx] = data;
    cancelEdit();
    save(); goto('list');
  } else {
    subs.push(data);
    this.reset(); toggleCustomCat();
    save(); goto('dashboard');
  }
});

function editSub(id) {
  const s = subs.find(x => x.id === id); if (!s) return;
  goto('add');
  editId = id;
  document.getElementById('form-lbl').textContent = 'サブスクを編集';
  document.getElementById('quick-section').style.display = 'none';
  document.getElementById('f-name').value = s.name;
  document.getElementById('f-price').value = s.price;
  document.getElementById('f-freq').value = s.freq;
  document.getElementById('f-date').value = s.date;
  document.getElementById('f-memo').value = s.memo || '';
  const sel = document.getElementById('f-cat');
  const isDefault = Array.from(sel.options).some(o => o.value === s.cat && o.value !== 'その他');
  if (isDefault) { sel.value = s.cat; }
  else { sel.value = 'その他'; document.getElementById('f-cat-custom').value = s.cat; }
  toggleCustomCat();
  document.getElementById('btn-submit').textContent = '更新する';
  document.getElementById('btn-cancel').style.display = 'block';
}

function cancelEdit() {
  editId = null;
  document.getElementById('form-lbl').textContent = '手動で入力';
  document.getElementById('quick-section').style.display = 'block';
  document.getElementById('add-form').reset();
  toggleCustomCat();
  document.getElementById('btn-submit').textContent = '登録する';
  document.getElementById('btn-cancel').style.display = 'none';
}

function delSub(id) {
  if (!confirm('削除しますか？')) return;
  subs = subs.filter(s => s.id !== id);
  if (editId === id) cancelEdit();
  save(); renderList(); renderDashboard();
}

function save() { localStorage.setItem('subsData', JSON.stringify(subs)); }

/* ============================================================
   明細リスト
============================================================ */
function monthlyOf(s) {
  if (s.freq === '単発（買い切り）') return s.price;
  return s.freq === '月額' ? s.price : Math.floor(s.price / 12);
}

function renderList() {
  const box = document.getElementById('sub-list');
  const cat = document.getElementById('fl-cat').value;
  const srt = document.getElementById('fl-sort').value;
  box.innerHTML = '';
  document.getElementById('list-cnt').textContent = `${subs.length} / ${MAX}件`;

  if (subs.length === 0) {
    box.innerHTML = '<div class="empty">📝 登録データがありません<br>「追加」タブから登録してください</div>';
    return;
  }

  let list = [...subs];
  if (cat !== 'all') {
    if (cat === 'その他') list = list.filter(s => !catMap[s.cat] || catMap[s.cat].icon === '✨');
    else list = list.filter(s => s.cat === cat);
  }
  if (list.length === 0) { box.innerHTML = '<div class="empty">該当するデータがありません</div>'; return; }

  if (srt === 'date-asc')   list.sort((a,b) => new Date(a.date)-new Date(b.date));
  else if (srt === 'price-desc') list.sort((a,b) => monthlyOf(b)-monthlyOf(a));
  else list.sort((a,b) => b.id-a.id);

  list.forEach(s => {
    const ci = catMap[s.cat] || catMap['その他'];
    const freqLbl = s.freq === '単発（買い切り）' ? '買い切り' : s.freq;
    const d = document.createElement('div');
    d.className = 'sub-card';
    d.innerHTML = `
      <div class="sub-top">
        <div class="sub-name">${s.name}</div>
        <div class="sub-price">¥${s.price.toLocaleString()}<span class="unit"> / ${freqLbl}</span></div>
      </div>
      <div class="sub-mid">
        <span class="badge" style="background:${ci.color}">${ci.icon} ${s.cat}</span>
      </div>
      <div class="sub-bot">
        <div>
          <div class="sub-meta">次回更新: ${s.date}</div>
          ${s.memo ? `<div class="sub-memo">📝 ${s.memo}</div>` : ''}
        </div>
        <div class="action-row">
          <button class="btn-edit" onclick="editSub(${s.id})">編集</button>
          <button class="btn-del"  onclick="delSub(${s.id})">削除</button>
        </div>
      </div>`;
    box.appendChild(d);
  });
}

/* ============================================================
   ダッシュボード
============================================================ */
function toggleOnetime() {
  inclOnetime = document.getElementById('sw-onetime').checked;
  localStorage.setItem('inclOnetime', JSON.stringify(inclOnetime));
  renderDashboard();
}

function setPeriod(p) {
  chartPeriod = p;
  document.getElementById('pbtn-month').classList.toggle('active', p==='month');
  document.getElementById('pbtn-year').classList.toggle('active', p==='year');
  renderDashboard();
}

function renderDashboard() {
  let monthly = 0, yearly = 0;
  const cmap = {};
  const note = document.getElementById('onetime-note');
  note.style.display = (inclOnetime && chartPeriod==='year') ? 'block' : 'none';

  subs.forEach(s => {
    let mo = 0, yr = 0, cost = 0;
    if (s.freq === '単発（買い切り）') {
      if (!inclOnetime) return;
      yr = s.price;
      cost = chartPeriod==='year' ? s.price : 0;
    } else {
      mo = s.freq==='月額' ? s.price : Math.floor(s.price/12);
      yr = s.freq==='年額' ? s.price : s.price*12;
      cost = chartPeriod==='month' ? mo : yr;
    }
    monthly += mo; yearly += yr;
    if (cost > 0) {
      const key = catMap[s.cat] ? s.cat : 'その他';
      cmap[key] = (cmap[key]||0) + cost;
    }
  });

  document.getElementById('ttl-month').innerHTML = `<sup>¥</sup>${monthly.toLocaleString()}`;
  document.getElementById('ttl-year').innerHTML  = `<sup>¥</sup>${yearly.toLocaleString()}`;

  // インサイト
  const ib = document.getElementById('insight-bar');
  if (yearly > 0 && !inclOnetime) {
    const principal = (Math.floor(yearly/0.04)/10000).toLocaleString(undefined,{maximumFractionDigits:1});
    ib.style.display = 'block';
    ib.innerHTML = `💡 サブスク代を配当金（利回り4%）で賄うには、約 <b>${principal}万円</b> の投資元本が必要です。`;
  } else {
    ib.style.display = 'none';
  }

  drawChart(cmap);
  checkAlerts();
}

function drawChart(obj) {
  const ctx = document.getElementById('chart').getContext('2d');
  const sorted = Object.entries(obj).sort((a,b)=>b[1]-a[1]);
  const labels = sorted.map(x=>x[0]);
  const data   = sorted.map(x=>x[1]);
  const colors = labels.map(l=>catMap[l].color);

  if (myChart) myChart.destroy();
  if (!labels.length) return;

  myChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets:[{ data, backgroundColor:colors, borderWidth:2, borderColor:'#F4F6F8' }] },
    options: {
      responsive:true, maintainAspectRatio:false,
      cutout: '62%',
      plugins: {
        legend:{ position:'right', labels:{ boxWidth:10, font:{size:11}, padding:12 } },
        tooltip:{ callbacks:{ label: ctx => ` ¥${ctx.raw.toLocaleString()}` } }
      },
      onClick:(e, els) => {
        if (els.length) goto('list', myChart.data.labels[els[0].index]);
      }
    }
  });
}

function checkAlerts() {
  const box = document.getElementById('alerts');
  box.innerHTML = '';
  ['動画・配信','音楽','電子書籍・雑誌'].forEach(cat => {
    const items = subs.filter(s => s.cat===cat && s.freq!=='単発（買い切り）');
    if (items.length >= 2) {
      const div = document.createElement('div');
      div.className = 'alert-box';
      div.innerHTML = `<button class="x" onclick="this.parentElement.remove()">✕</button>
        <strong>💡 節約のヒント</strong><br>
        「${cat}」が ${items.length}件（${items.map(s=>s.name).join('、')}）あります。利用頻度の低いものは解約を検討しましょう。`;
      box.appendChild(div);
    }
  });
}

/* ============================================================
   起動
============================================================ */
init();
</script>
